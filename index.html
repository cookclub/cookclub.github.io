<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Spoon Society - July Meetup RSVP</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif; /* A clean, common font */
            margin: 0;
            padding: 0;
            background-color: #f8f8f8; /* Light, neutral background */
            color: #333;
            line-height: 1.6;
        }
        .hero {
            background-color: #e0f2f7; /* Light blue, inviting background */
            padding: 60px 20px;
            text-align: center;
            margin-bottom: 30px;
        }
        .hero h1 {
            font-size: 2.8em;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .hero p {
            font-size: 1.2em;
            color: #555;
            max-width: 700px;
            margin: 0 auto;
        }
        .container {
            max-width: 900px; /* Slightly wider to give the form more space */
            margin: 0 auto;
            padding: 0 20px 40px; /* Add bottom padding */
        }
        .form-section {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 20px;
        }
        .form-section h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 1.8em;
        }
        /* Style for the iframe itself - make it blend */
        .airtable-embed {
            border: none; /* Remove the default border */
            width: 100%;
            /* Adjust height based on your content. You'll need to test this! */
            /* Start with a generous height and adjust down if too much empty space */
            height: 1000px; /* Example: This will likely remove the internal scrollbar */
            display: block; /* Ensures it takes full width and behaves like a block element */
        }

        /* Basic responsiveness for smaller screens */
        @media (max-width: 768px) {
            .hero {
                padding: 40px 15px;
            }
            .hero h1 {
                font-size: 2em;
            }
            .hero p {
                font-size: 1em;
            }
            .container {
                padding: 0 15px 30px;
            }
            .form-section {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome, Big Spoon Society Pals!</h1>
        <p>We're thrilled to invite you to our July cookbook club meetup. Please RSVP and claim your recipe below!</p>
    </div>

    <div class="container">
        <div class="form-section">
            <h2>RSVP & Claim Your Recipe</h2>
            <!-- Airtable Embed Code Starts Here -->
            <!-- IMPORTANT: Adjust the height attribute below based on testing! -->
            <iframe class="airtable-embed" src="https://airtable.com/embed/appIAkfA9Dy3C2a3b/pag0mXcpokEjMoU9A/form" frameborder="0" onmousewheel="" width="100%" height="1000px" style="background: transparent;"></iframe>
            <!-- Airtable Embed Code Ends Here -->
        </div>
    </div>
</body>
</html>
